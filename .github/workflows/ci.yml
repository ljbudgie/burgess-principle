name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[test,api,onchain]"

      - name: Run tests
        run: python -m pytest tests/

  javascript-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: enforcement/sovereign-vault/package-lock.json

      - name: Run Sovereign Core tests
        run: node --test tests/sovereign_core.test.mjs

      - name: Install Sovereign Vault dependencies
        working-directory: enforcement/sovereign-vault
        run: npm ci

      - name: Run Sovereign Vault tests
        working-directory: enforcement/sovereign-vault
        run: npm test

      - name: Build Sovereign Vault
        working-directory: enforcement/sovereign-vault
        run: npm run build
